<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Baloo+2:wght@500;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; }
  body {
    min-height: 1660px;
    background: radial-gradient(120% 70% at 50% -5%, #23232e 0%, #16161d 55%, #0f0f14 100%);
    font-family: 'Baloo 2', sans-serif;
    color: #fff;
    padding: 54px 60px 60px;
  }
  .title { display: flex; align-items: center; gap: 18px; }
  .logo {
    width: 58px; height: 58px; border-radius: 15px;
    background: linear-gradient(160deg, #ff5b48, #d61f0c);
    border: 3px solid #0f0f14;
    box-shadow: 0 6px 0 #7e1206, inset 0 2px 0 rgba(255,255,255,.45);
    display: flex; align-items: center; justify-content: center;
  }
  .logo > div { width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: inset 0 0 0 4px #ffd34d, 0 0 0 3px rgba(0,0,0,.25); }
  .brand { font-family: 'Bungee'; font-size: 38px; letter-spacing: 1px; text-shadow: 0 3px 0 #b81c0a, 0 5px 14px rgba(216,31,12,.45); }
  .sub { font-family: 'Press Start 2P'; font-size: 10px; color: #ff9d8c; margin: 16px 0 32px; letter-spacing: 1px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 34px 36px; }
  .cell { display: flex; flex-direction: column; align-items: center; }
  .cap { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
  .n { font-family: 'Press Start 2P'; font-size: 11px; color: #ff5b48; }
  .l { font-family: 'Baloo 2'; font-weight: 800; font-size: 17px; color: #fff; }
  .ph { width: 296px; padding: 9px; background: #0d0d12; border-radius: 40px; box-shadow: 0 0 0 2px #2a2a34, 0 26px 50px rgba(0,0,0,.55); }
  .ph img { display: block; width: 278px; height: 618px; border-radius: 32px; object-fit: cover; }
</style>
</head>
<body>
  <div class="title"><div class="logo"><div></div></div><div class="brand">POCODEX</div></div>
  <div class="sub">CODEX &amp; ARÈNE · MAQUETTES ANDROID · 100% HORS-LIGNE</div>
  <div class="grid">
    <div class="cell"><div class="cap"><span class="n">01</span><span class="l">Accueil · Codex</span></div><div class="ph"><img src="01_home.png"></div></div>
    <div class="cell"><div class="cap"><span class="n">02</span><span class="l">Fiche · type Feu</span></div><div class="ph"><img src="02_detail_feu.png"></div></div>
    <div class="cell"><div class="cap"><span class="n">03</span><span class="l">Fiche · type Eau</span></div><div class="ph"><img src="03_detail_eau.png"></div></div>
    <div class="cell"><div class="cap"><span class="n">04</span><span class="l">Mon Équipe</span></div><div class="ph"><img src="04_equipe.png"></div></div>
    <div class="cell"><div class="cap"><span class="n">05</span><span class="l">Arène de combat</span></div><div class="ph"><img src="05_arene.png"></div></div>
    <div class="cell"><div class="cap"><span class="n">06</span><span class="l">Combat en ligne</span></div><div class="ph"><img src="06_lobby.png"></div></div>
  </div>
</body>
</html>
